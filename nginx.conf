server {
  listen 4000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip everything compressible — nginx-unprivileged ships with gzip_types
  # text/html only by default, which is not enough for a Tailwind + Angular
  # bundle. Keep off for already-compressed formats (woff2, images).
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;
  gzip_vary on;

  # K8s probe target. Matches `health.path: /health` in the homelab values.
  location = /health {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok"}';
  }

  # Fingerprinted assets — Angular hashes every JS/CSS filename, so these
  # are safe to cache forever. Fonts and images in /assets are similarly
  # content-addressable via their path.
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # HTML + everything else. Short browser TTL (5m) keeps redeploys snappy;
  # long CDN TTL (1d) + SWR (1w) lets Cloudflare hold onto pages between
  # deploys and serve stale while revalidating on miss.
  location / {
    add_header Cache-Control "public, max-age=300, s-maxage=86400, stale-while-revalidate=604800";
    # Angular prerender emits `/work/index.html` for route `/work`. Look up
    # the indexed form directly — avoids the 301-to-trailing-slash that nginx
    # would emit if we relied on `$uri/` against the directory. `/index.html`
    # is the SPA fallback for any unhandled route.
    try_files $uri $uri/index.html $uri.html /index.html;
  }
}
