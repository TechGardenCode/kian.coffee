log_format json_combined escape=json
  '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"cf_connecting_ip":"$http_cf_connecting_ip",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"request_time":$request_time,'
    '"referer":"$http_referer",'
    '"user_agent":"$http_user_agent",'
    '"cf_ray":"$http_cf_ray"'
  '}';
access_log /dev/stdout json_combined;

upstream openpanel_upstream {
  server openpanel.techgarden.gg:443;
  keepalive 8;
}
upstream glitchtip_upstream {
  server glitchtip.techgarden.gg:443;
  keepalive 8;
}

server {
  listen 4000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;
  gzip_vary on;

  # nginx add_header doesn't inherit once a location sets its own;
  # every location that adds a header also includes this snippet.
  include /etc/nginx/security-headers.conf;

  location = /health {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok"}';
  }

  location = /runtime-config.js {
    alias /tmp/runtime-config.js;
    default_type application/javascript;
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store" always;
  }

  # Upstream serves op1.js at /op1.js, not /api/op1.js — exact match
  # wins over the /api/op/ prefix below regardless of declaration order.
  location = /api/op/op1.js {
    include /etc/nginx/security-headers.conf;
    include /etc/nginx/proxy-common.conf;
    proxy_ssl_name openpanel.techgarden.gg;
    proxy_set_header Host openpanel.techgarden.gg;
    proxy_pass https://openpanel_upstream/op1.js;
  }

  location /api/op/ {
    include /etc/nginx/security-headers.conf;
    include /etc/nginx/proxy-common.conf;
    proxy_ssl_name openpanel.techgarden.gg;
    proxy_set_header Host openpanel.techgarden.gg;
    proxy_pass https://openpanel_upstream/api/;
  }

  # /tmp/glitchtip-auth.conf is generated at pod start by
  # docker/render-runtime-config.sh from the GLITCHTIP_DSN public key.
  location ~ ^/api/gt/([0-9]+)/envelope$ {
    include /etc/nginx/security-headers.conf;
    include /etc/nginx/proxy-common.conf;
    include /tmp/glitchtip-auth.conf;
    proxy_ssl_name glitchtip.techgarden.gg;
    proxy_set_header Host glitchtip.techgarden.gg;
    proxy_pass https://glitchtip_upstream/api/$1/envelope/;
  }

  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location / {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=300, s-maxage=86400, stale-while-revalidate=604800" always;
    try_files $uri $uri/index.html $uri.html /index.html;
  }
}
