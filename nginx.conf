# Structured access log — picked up by Alloy's `loki.source.kubernetes`
# from container stdout, then parsed with `| json` in Grafana Explore.
log_format json_combined escape=json
  '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"cf_connecting_ip":"$http_cf_connecting_ip",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"request_time":$request_time,'
    '"referer":"$http_referer",'
    '"user_agent":"$http_user_agent",'
    '"cf_ray":"$http_cf_ray"'
  '}';
access_log /dev/stdout json_combined;

# Same-origin reverse proxies for the self-hosted observability stack.
# Both upstreams share a broken CORS preflight (gateway omits Access-
# Control-Allow-Origin and the custom SDK headers) — every cross-origin
# browser POST fails with NetworkError. Proxying turns ingest into a
# same-origin request, skipping preflight entirely. This is an upstream-
# config workaround; remove when the gateway CORS is fixed.
upstream openpanel_upstream {
  server openpanel.techgarden.gg:443;
  keepalive 8;
}

upstream glitchtip_upstream {
  server glitchtip.techgarden.gg:443;
  keepalive 8;
}

server {
  listen 4000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip everything compressible — nginx-unprivileged ships with gzip_types
  # text/html only by default, which is not enough for a Tailwind + Angular
  # bundle. Keep off for already-compressed formats (woff2, images).
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;
  gzip_vary on;

  # Security headers — nginx `add_header` has a gotcha: once a nested
  # `location` declares any `add_header`, it inherits NONE from the outer
  # scope. So every `location` with its own headers must `include` this
  # snippet. Kept at server scope as a backstop for default matches.
  include /etc/nginx/security-headers.conf;

  # K8s probe target. Matches `health.path: /health` in the homelab values.
  location = /health {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok"}';
  }

  # Runtime-injected env bundle. Rendered once at container start by
  # docker/30-runtime-config.sh from env vars (OpenPanel client ID,
  # GlitchTip DSN, APP_ENV). Must be no-store so operators rotating a
  # DSN don't get served a stale config from any cache.
  location = /runtime-config.js {
    alias /tmp/runtime-config.js;
    default_type application/javascript;
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store" always;
  }

  # OpenPanel tracker script. Upstream serves it at root `/op1.js`; the
  # SDK's POSTs later target `/api/*`. Exact match so nginx resolves this
  # over the `/api/op/` prefix match below (nginx prefers `=` regardless
  # of declaration order).
  location = /api/op/op1.js {
    include /etc/nginx/security-headers.conf;
    proxy_pass https://openpanel_upstream/op1.js;
    proxy_ssl_server_name on;
    proxy_ssl_name openpanel.techgarden.gg;
    proxy_set_header Host openpanel.techgarden.gg;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 2s;
    proxy_read_timeout 5s;
  }

  # GlitchTip / Sentry envelope tunnel. The Sentry SDK is configured with
  # `tunnel: '/api/gt/<project>/envelope'` — tunnel mode strips the
  # X-Sentry-Auth header the upstream requires (spec: backend reconstructs
  # from the envelope's embedded DSN, but GlitchTip returns 403 without
  # it). docker/30-runtime-config.sh parses the sentry_key from
  # GLITCHTIP_DSN at pod start and writes a `proxy_set_header X-Sentry-
  # Auth` directive to /tmp/glitchtip-auth.conf, which we include here.
  location ~ ^/api/gt/([0-9]+)/envelope$ {
    include /etc/nginx/security-headers.conf;
    include /tmp/glitchtip-auth.conf;
    proxy_pass https://glitchtip_upstream/api/$1/envelope/;
    proxy_ssl_server_name on;
    proxy_ssl_name glitchtip.techgarden.gg;
    proxy_set_header Host glitchtip.techgarden.gg;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 2s;
    proxy_read_timeout 5s;
    proxy_send_timeout 5s;
    proxy_buffering off;
    proxy_no_cache 1;
    proxy_cache_bypass 1;
  }

  # OpenPanel ingest endpoints (/api/op/track, /api/op/identify, ...).
  # Must never be cached — duplicate events would be swallowed.
  location /api/op/ {
    include /etc/nginx/security-headers.conf;
    proxy_pass https://openpanel_upstream/api/;
    proxy_ssl_server_name on;
    proxy_ssl_name openpanel.techgarden.gg;
    proxy_set_header Host openpanel.techgarden.gg;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 2s;
    proxy_read_timeout 5s;
    proxy_send_timeout 5s;
    proxy_buffering off;
    proxy_no_cache 1;
    proxy_cache_bypass 1;
  }

  # Fingerprinted assets — Angular hashes every JS/CSS filename, so these
  # are safe to cache forever. Fonts and images in /assets are similarly
  # content-addressable via their path.
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # HTML + everything else. Short browser TTL (5m) keeps redeploys snappy;
  # long CDN TTL (1d) + SWR (1w) lets Cloudflare hold onto pages between
  # deploys and serve stale while revalidating on miss.
  location / {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=300, s-maxage=86400, stale-while-revalidate=604800" always;
    # Angular prerender emits `/work/index.html` for route `/work`. Look up
    # the indexed form directly — avoids the 301-to-trailing-slash that nginx
    # would emit if we relied on `$uri/` against the directory. `/index.html`
    # is the SPA fallback for any unhandled route.
    try_files $uri $uri/index.html $uri.html /index.html;
  }
}
