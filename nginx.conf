# Structured access log — picked up by Alloy's `loki.source.kubernetes`
# from container stdout, then parsed with `| json` in Grafana Explore.
log_format json_combined escape=json
  '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"cf_connecting_ip":"$http_cf_connecting_ip",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"request_time":$request_time,'
    '"referer":"$http_referer",'
    '"user_agent":"$http_user_agent",'
    '"cf_ray":"$http_cf_ray"'
  '}';
access_log /dev/stdout json_combined;

server {
  listen 4000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip everything compressible — nginx-unprivileged ships with gzip_types
  # text/html only by default, which is not enough for a Tailwind + Angular
  # bundle. Keep off for already-compressed formats (woff2, images).
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;
  gzip_vary on;

  # Security headers — nginx `add_header` has a gotcha: once a nested
  # `location` declares any `add_header`, it inherits NONE from the outer
  # scope. So every `location` with its own headers must `include` this
  # snippet. Kept at server scope as a backstop for default matches.
  include /etc/nginx/security-headers.conf;

  # K8s probe target. Matches `health.path: /health` in the homelab values.
  location = /health {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok"}';
  }

  # Runtime-injected env bundle. Rendered once at container start by
  # docker/30-runtime-config.sh from env vars (OpenPanel client ID,
  # GlitchTip DSN, APP_ENV). Must be no-store so operators rotating a
  # DSN don't get served a stale config from any cache.
  location = /runtime-config.js {
    alias /tmp/runtime-config.js;
    default_type application/javascript;
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store" always;
  }

  # Fingerprinted assets — Angular hashes every JS/CSS filename, so these
  # are safe to cache forever. Fonts and images in /assets are similarly
  # content-addressable via their path.
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # HTML + everything else. Short browser TTL (5m) keeps redeploys snappy;
  # long CDN TTL (1d) + SWR (1w) lets Cloudflare hold onto pages between
  # deploys and serve stale while revalidating on miss.
  location / {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=300, s-maxage=86400, stale-while-revalidate=604800" always;
    # Angular prerender emits `/work/index.html` for route `/work`. Look up
    # the indexed form directly — avoids the 301-to-trailing-slash that nginx
    # would emit if we relied on `$uri/` against the directory. `/index.html`
    # is the SPA fallback for any unhandled route.
    try_files $uri $uri/index.html $uri.html /index.html;
  }
}
