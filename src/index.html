  <meta name="theme-color" content="#f6ecdc" media="(prefers-color-scheme: light)">

  <script src="/runtime-config.js"></script>
  <script>
    // Vendor-canonical OpenPanel bootstrap: docs.openpanel.dev/docs/sdks/script.
    // op1.js does `new OpenPanel(queue.shift()[1])` on load — init must be
    // queued before the script tag is injected, and the script tag is only
    // injected when a client ID is present.
    (function () {
      window.op = window.op || function () {
        var n = [];
        return new Proxy(function () { arguments.length && n.push([].slice.call(arguments)); }, {
          get: function (t, r) { return r === 'q' ? n : function () { n.push([r].concat([].slice.call(arguments))); }; },
          has: function (t, r) { return r === 'q'; }
        });
      }();
      var env = window.__ENV;
      if (env && env.OPENPANEL_CLIENT_ID) {
        window.op('init', {
          clientId: env.OPENPANEL_CLIENT_ID,
          apiUrl: '/api/op',
          trackScreenViews: true,
          trackOutgoingLinks: true,
          trackAttributes: true,
        });
        var s = document.createElement('script');
        s.async = true;
        s.defer = true;
        s.src = '/api/op/op1.js';
        document.head.appendChild(s);
      }
    })();
  </script>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('kc-theme');
        var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
        var theme = stored || (prefersLight ? 'light' : 'dark');
        if (theme === 'dark') document.documentElement.classList.add('dark');
      } catch (_) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body class="bg-grain bg-cream-50 text-ink-900 dark:bg-roast-950 dark:text-taupe antialiased">
  <app-root></app-root>
</body>
