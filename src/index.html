<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>kian.coffee</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Kian Alikhani - full-stack IC architect at Mastercard. Career, side projects, homelab, and current focus.">
  <meta name="theme-color" content="#15100b" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f6ecdc" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico" sizes="any">
  <link rel="me" href="https://github.com/TechGardenCode">
  <link rel="me" href="https://www.linkedin.com/in/kian-alikhani-20b656100">
  <script src="/runtime-config.js"></script>
  <script>
    // OpenPanel queue shim — real SDK loads from /api/op/op1.js (same-origin proxy)
    // and drains window.op.q on arrival. Kept inline so calls before the SDK
    // loads are never lost.
    (function () {
      window.op = window.op || function () { (window.op.q = window.op.q || []).push(arguments); };
    })();
  </script>
  <script async src="/api/op/op1.js"></script>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('kc-theme');
        var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
        var theme = stored || (prefersLight ? 'light' : 'dark');
        if (theme === 'dark') document.documentElement.classList.add('dark');
      } catch (_) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body class="bg-grain bg-cream-50 text-ink-900 dark:bg-roast-950 dark:text-taupe antialiased">
  <app-root></app-root>
</body>
</html>
