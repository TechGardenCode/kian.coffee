add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header X-Frame-Options "DENY" always;
# CSP: everything first-party except GlitchTip ingest (Sentry/GlitchTip
# SDK POSTs crash payloads directly to the DSN host, not via proxy). All
# other telemetry (OpenPanel) is same-origin via /api/op/. 'unsafe-inline'
# styles are needed for Angular runtime CSS injection + Tailwind v4; the
# inline <script> in index.html is the theme bootstrap + OpenPanel queue
# shim, also covered by 'unsafe-inline'.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://glitchtip.techgarden.gg; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
