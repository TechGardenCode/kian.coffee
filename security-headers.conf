add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header X-Frame-Options "DENY" always;
# CSP: both OpenPanel and GlitchTip are same-origin via proxy/tunnel —
# /api/op/* for OpenPanel, /api/gt/<project>/envelope for Sentry. CSP
# stays fully first-party, no external ingest allowlist.
# 'unsafe-inline' styles: Angular runtime CSS injection + Tailwind v4.
# 'unsafe-inline' scripts: the theme bootstrap + OpenPanel queue shim in
# index.html.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
