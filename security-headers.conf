add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header X-Frame-Options "DENY" always;
# CSP: first-party for everything served from our own origin; explicit
# allowlist for the two self-hosted observability services (both on the
# techgarden.gg apex). OpenPanel needs script-src (op1.js is loaded
# directly) + connect-src (SDK POSTs events to /api). GlitchTip only
# needs connect-src (Sentry SDK POSTs crash envelopes via fetch).
# 'unsafe-inline' styles: Angular runtime CSS injection + Tailwind v4.
# 'unsafe-inline' scripts: the theme bootstrap + OpenPanel queue shim in
# index.html.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://openpanel.techgarden.gg; connect-src 'self' https://openpanel.techgarden.gg https://glitchtip.techgarden.gg; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
